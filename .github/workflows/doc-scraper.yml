name: Optilogic Document Scraper

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 9:00 JST (UTC 0:00)
  workflow_dispatch:      # GitHub画面から手動実行も可能

permissions:
  contents: write         # notebook_source.md をコミットバックするために必要

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run scraper
        run: uv run document-scraper/scraper.py

      - name: Commit updated notebook_source.md
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add document-scraper/notebook_source.md
          git diff --staged --quiet || git commit -m "chore: update notebook_source.md [skip ci]"
          git diff HEAD origin/main --quiet || git push
